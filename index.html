<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    *, *::before, *::after{box-sizing:border-box}
    p{margin:8px 0;}
    body{display:flex;flex-flow:column wrap;align-items:center;justify-content:center;background-color:hsl(47, 88%, 63%);font-family: "Outfit", sans-serif;font-optical-sizing: auto;font-style: normal;-ms-text-size-adjust: 100%;-moz-text-size-adjust: 100%;-webkit-text-size-adjust: 100%;padding:0;font-size:15px;line-height:1.5;min-height:100vh;}
    img{max-width:100%;height: auto;vertical-align: middle;}

    .blog-card{box-shadow:8px 8px 0px 1px #000;border:1px solid #000;max-width:375px;padding:24px;border-radius:16px;background-color:hsl(0, 0%, 100%);}
    .blog-card .img-data img{width:100%;border-radius:16px;}
    .blog-card .content{margin-top:16px;}
    .blog-card .content .title{background-color:hsl(47, 88%, 63%);display:inline-block;font-weight:bolder;border-radius:4px;padding:4px 12px;}
    .blog-card .content .article-text{color:hsl(0, 0%, 42%);}
    .blog-card .content section{margin-top:32px;}
    .blog-card .content h2:hover{color:hsl(47, 88%, 63%);cursor:pointer}
    .blog-card .content section img{width:35px;height:35px;margin-right:10px;}

    .attribution { font-size: 0.6875rem; text-align: center;position:absolute;bottom:10px;}
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>

</head>
<body>

  <article class="blog-card">
    <div class="img-data"><img src='illustration-article.svg' alt="Waiting..."></div>
    <div class="content">
      <p class="title">Learning</p>
      <p class="publishing-date">Published 21 Dec 2023</p>
      <h2>HTML & CSS foundations</h2>
      <p class="article-text">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      <section>
        <img src="image-avatar.webp" alt="User">
        <span><b>Greg Hooper</b></span>
      </section>
    </div>
  </article>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/ahmedsorror2004">Ahmed Adel Abdulmoniem Mohamed</a>.
  </footer>
</body>
</html>
